<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleCLI - Terminal</title>
    <link rel="stylesheet" href="style.css">
    <!-- xterm.js for full terminal emulation -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🖥️ TeleCLI</h1>
            <p>Web-based Terminal Interface</p>
            <div class="controls">
                <button id="ai-proxy-btn" onclick="toggleAIProxy()">🤖 AI Proxy: OFF</button>
                <button id="ai-proxy-reset-btn" onclick="resetAIProxy()" style="display: none;">🔄 Reset AI</button>
                <button id="ctrl-c-btn" onclick="sendCtrlC()">⌧ Ctrl+C</button>
                <button id="reset-btn" onclick="resetSession()">🔁 Reset Terminal</button>
            </div>
            <div id="proxy-status" style="margin-top: 10px; font-size: 14px; font-weight: bold; color: #b0b0b0;"></div>
            <div id="auth-status" style="margin-top: 5px; font-size: 12px; color: #b0b0b0;"></div>
        </header>
        
        <!-- AI Proxy Settings Modal -->
        <div id="proxy-settings-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
            <div style="background: #2a2a2a; padding: 30px; border-radius: 10px; max-width: 600px; width: 90%;">
                <h2 style="margin-top: 0; color: #fff;">🤖 AI Proxy Settings</h2>
                
                <div style="margin: 20px 0;">
                    <label style="display: block; margin-bottom: 5px; color: #b0b0b0; font-weight: bold;">System Prompt:</label>
                    <textarea id="system-prompt-input" 
                              style="width: 100%; height: 120px; padding: 10px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #667eea; border-radius: 5px; font-family: monospace; font-size: 13px; resize: vertical;"
                              placeholder="You are helping automate terminal interactions..."></textarea>
                    <small style="color: #7f8c8d;">This sets the AI's role and behavior. Be specific about what kind of responses you want.</small>
                </div>
                
                <div style="margin: 20px 0;">
                    <label style="display: block; margin-bottom: 5px; color: #b0b0b0; font-weight: bold;">Additional Context (Optional):</label>
                    <textarea id="context-input" 
                              style="width: 100%; height: 80px; padding: 10px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #667eea; border-radius: 5px; font-family: monospace; font-size: 13px; resize: vertical;"
                              placeholder="e.g., Working on a Python web app, focus on FastAPI patterns..."></textarea>
                    <small style="color: #7f8c8d;">Add project-specific context that will be prepended to the system prompt.</small>
                </div>
                
                <div style="margin: 20px 0;">
                    <label style="display: block; margin-bottom: 5px; color: #b0b0b0; font-weight: bold;">Provider:</label>
                    <select id="provider-select" style="width: 100%; padding: 10px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #667eea; border-radius: 5px; font-size: 14px;">
                        <option value="gemini-cli">Gemini CLI</option>
                        <option value="claude-cli">Claude CLI</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px;">
                    <button onclick="closeProxySettings()" style="padding: 10px 20px; background: #95a5a6; color: white; border: none; border-radius: 5px; cursor: pointer;">Cancel</button>
                    <button onclick="applyProxySettings()" style="padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer;">Enable AI Proxy</button>
                </div>
            </div>
        </div>
        
        <div class="terminal" id="terminal-container"></div>
        
        <footer>
            <div id="status">Connecting...</div>
            <div id="stats"></div>
        </footer>
    </div>

    <script>
        const clientId = 'web-' + crypto.getRandomValues(new Uint8Array(16))
            .reduce((hex, byte) => hex + byte.toString(16).padStart(2, '0'), '');
        let ws = null;
        let isConnected = false;
        let term = null;
        let fitAddon = null;
        let aiProxyEnabled = false;
        let systemPrompt = "";  // Will be loaded from backend
        let additionalContext = "";
        let defaultProvider = "gemini-cli";  // Will be loaded from backend

        function initTerminal() {
            // Create xterm.js terminal
            term = new Terminal({
                cursorBlink: true,
                fontSize: 14,
                fontFamily: 'Menlo, Monaco, "Courier New", monospace',
                theme: {
                    background: '#1e1e1e',
                    foreground: '#ffffff',
                    cursor: '#ffffff'
                },
                rows: 30,
                cols: 100,
                scrollback: 10000,
                // Prevent auto-scroll to top
                convertEol: true,
                scrollOnUserInput: false,  // Don't scroll when user types
                fastScrollModifier: 'shift'
            });
            
            // Add fit addon for responsive sizing
            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            
            // Open terminal in container
            term.open(document.getElementById('terminal-container'));
            fitAddon.fit();
            
            // Send initial terminal size
            sendTerminalSize();
            
            // Handle terminal input
            term.onData((data) => {
                if (isConnected && ws) {
                    ws.send(JSON.stringify({ input: data }));
                }
            });
            
            // Handle window resize
            window.addEventListener('resize', () => {
                if (fitAddon) {
                    fitAddon.fit();
                    sendTerminalSize();
                }
            });
        }

        function sendTerminalSize() {
            if (term && ws && isConnected) {
                const rows = term.rows;
                const cols = term.cols;
                ws.send(JSON.stringify({ 
                    resize: { rows: rows, cols: cols } 
                }));
            }
        }

        function getWebSocketUrl() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            let token = '';

            // Try to get token from localStorage
            token = localStorage.getItem('terminal-auth-token');
            if (!token) {
                token = prompt("Enter authentication token:") || "";
                if (token) {
                    localStorage.setItem('terminal-auth-token', token);
                }
            }

            const url = `${protocol}//${window.location.host}/ws/${clientId}`;
            return token ? `${url}?token=${encodeURIComponent(token)}` : url;
        }

        function connectWebSocket() {
            try {
                ws = new WebSocket(getWebSocketUrl());
                
                ws.onopen = () => {
                    isConnected = true;
                    updateStatus('Connected', 'success');
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.output && term) {
                            // Save scroll position to prevent auto-scroll
                            const wasAtBottom = term.buffer.active.baseY + term.rows >= term.buffer.active.length;
                            
                            // Write output directly to xterm
                            term.write(data.output);
                            
                            // Only scroll to bottom if user was already at bottom
                            if (wasAtBottom) {
                                term.scrollToBottom();
                            }
                        } else if (data.error) {
                            term.write('\r\n\x1b[31mError: ' + data.error + '\x1b[0m\r\n');
                        } else if (data.proxy_status) {
                            updateProxyStatus(data.proxy_status);
                        }
                    } catch (e) {
                        console.error('Error parsing message:', e);
                    }
                };
                
                ws.onerror = (error) => {
                    updateStatus('Error', 'error');
                };
                
                ws.onclose = () => {
                    isConnected = false;
                    updateStatus('Disconnected - Reconnecting...', 'warning');
                    setTimeout(connectWebSocket, 3000);
                };
            } catch (e) {
                updateStatus('Connection failed', 'error');
            }
        }

        function toggleAIProxy() {
            if (!isConnected) {
                return;
            }
            
            if (aiProxyEnabled) {
                // Disable AI proxy
                aiProxyEnabled = false;
                ws.send(JSON.stringify({ proxy: { disable: true } }));
                document.getElementById('ai-proxy-btn').style.backgroundColor = '#9b59b6';
                document.getElementById('ai-proxy-btn').textContent = '🤖 AI Proxy: OFF';
                document.getElementById('ai-proxy-reset-btn').style.display = 'none';
                document.getElementById('proxy-status').textContent = '';
            } else {
                // Show settings modal
                openProxySettings();
            }
        }
        
        function resetAIProxy() {
            if (!isConnected || !aiProxyEnabled) {
                return;
            }
            
            // Disable and re-enable to reset iteration counter
            ws.send(JSON.stringify({ proxy: { disable: true } }));
            
            // Re-enable after a brief delay
            setTimeout(() => {
                // Build full prompt with context
                let fullPrompt = systemPrompt;
                if (additionalContext) {
                    fullPrompt = `Context: ${additionalContext}\n\n${systemPrompt}`;
                }
                
                ws.send(JSON.stringify({ 
                    proxy: { 
                        enable: true, 
                        provider: defaultProvider || 'gemini-cli',
                        system_prompt: fullPrompt
                    } 
                }));
            }, 100);
        }
        
        async function openProxySettings() {
            // Load config from backend if not already loaded
            if (!systemPrompt) {
                try {
                    const response = await fetch('/api/ai-proxy/config');
                    const config = await response.json();
                    systemPrompt = config.default_system_prompt;
                    defaultProvider = config.default_provider;
                } catch (e) {
                    console.error('Failed to load AI proxy config:', e);
                    systemPrompt = 'You are helping automate terminal interactions.';
                }
            }
            
            // Pre-fill with current values
            document.getElementById('system-prompt-input').value = systemPrompt;
            document.getElementById('context-input').value = additionalContext;
            document.getElementById('provider-select').value = defaultProvider;
            document.getElementById('proxy-settings-modal').style.display = 'flex';
        }
        
        function closeProxySettings() {
            document.getElementById('proxy-settings-modal').style.display = 'none';
        }
        
        function applyProxySettings() {
            // Get values from form
            systemPrompt = document.getElementById('system-prompt-input').value.trim();
            additionalContext = document.getElementById('context-input').value.trim();
            const provider = document.getElementById('provider-select').value;
            
            // Build full prompt with context
            let fullPrompt = systemPrompt;
            if (additionalContext) {
                fullPrompt = `Context: ${additionalContext}\n\n${systemPrompt}`;
            }
            
            // Enable AI proxy with custom prompt
            aiProxyEnabled = true;
            ws.send(JSON.stringify({ 
                proxy: { 
                    enable: true, 
                    provider: provider,
                    system_prompt: fullPrompt
                } 
            }));
            
                document.getElementById('ai-proxy-btn').textContent = '🤖 AI Proxy: ON';
                document.getElementById('ai-proxy-reset-btn').style.display = 'inline-block';
            closeProxySettings();
        }

        function updateProxyStatus(status) {
            if (status.enabled) {
                const pct = Math.round((status.iterations / status.max_iterations) * 100);
                let color = '#00ff41';  // Matrix green
                if (pct > 80) {
                    color = '#ffff00';  // Yellow warning
                } else if (pct >= 100) {
                    color = '#ff0000';  // Red at limit
                }
                
                const statusText = `🤖 ${status.provider} | 🔄 ${status.iterations}/${status.max_iterations} (${pct}%)`;
                document.getElementById('proxy-status').textContent = statusText;
                document.getElementById('proxy-status').style.color = color;
                document.getElementById('ai-proxy-reset-btn').style.display = 'inline-block';
            } else {
                document.getElementById('proxy-status').textContent = '';
                document.getElementById('ai-proxy-reset-btn').style.display = 'none';
            }
        }

        function sendCtrlC() {
            if (!isConnected) {
                return;
            }
            
            // Send Ctrl+C (ASCII 0x03)
            try {
                ws.send(JSON.stringify({ input: '\x03' }));
            } catch (e) {
                console.error('Failed to send Ctrl+C');
            }
        }

        function resetSession() {
            if (confirm('Reset your terminal session?')) {
                fetch(`/reset/${clientId}`, { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        if (term) term.clear();
                        ws.close();
                        setTimeout(() => connectWebSocket(), 500);
                    })
                    .catch(e => console.error('Failed to reset'));
            }
        }


        function updateStatus(text, type) {
            const status = document.getElementById('status');
            status.textContent = text;
            status.className = `status-${type}`;
            
            // Fetch stats
            fetch('/stats')
                .then(r => r.json())
                .then(data => {
                    const stats = document.getElementById('stats');
                    stats.textContent = `Sessions: ${data.active_sessions}/${data.max_sessions}`;
                })
                .catch(e => {});
        }

        // Check if auth is required
        fetch('/api/auth/required')
            .then(r => r.json())
            .then(data => {
                if (data.auth_required) {
                    document.getElementById('auth-status').textContent = '🔒 Authentication enabled';
                }
            })
            .catch(e => console.debug('Auth check not available'));

        // Initialize terminal and connect
        initTerminal();
        connectWebSocket();
    </script>
</body>
</html>
