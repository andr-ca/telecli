[pytest]
# Pytest configuration for TeleCLI tests

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers
markers =
    asyncio: async test using pytest-asyncio
    slow: slow running test
    requires_server: test that requires server to be running
    playwright: Playwright-based test
    websocket: WebSocket-specific test
    web_ui: Web UI test

# Asyncio mode
asyncio_mode = auto

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.8
