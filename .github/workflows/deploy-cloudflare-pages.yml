name: Deploy TeleCLI Website

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "website/**"
      - "scripts/cloudflare_pages_setup.py"
      - "scripts/validate_static_site.py"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: "preprod"
        type: choice
        options:
          - preprod
          - prod

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-preprod:
    name: Deploy preprod
    if: >-
      (github.event_name == 'push' && github.ref_name == 'develop') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'preprod')
    runs-on: ubuntu-latest
    environment:
      name: ${{ 'preprod' }}
      url: https://preprod.telecli.org
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Cloudflare Pages preprod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: telecli-preprod
          CLOUDFLARE_PAGES_PRODUCTION_BRANCH: develop
          CLOUDFLARE_PAGES_CUSTOM_DOMAINS: preprod.telecli.org
          CLOUDFLARE_DNS_TARGET: telecli-preprod.pages.dev
          CLOUDFLARE_ZONE_NAME: telecli.org
          CLOUDFLARE_REPLACE_CONFLICTING_DNS: "true"
        run: python scripts/cloudflare_pages_setup.py

      - name: Deploy preprod to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website --project-name=telecli-preprod --branch=develop
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate preprod deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          CUSTOM_URL: https://preprod.telecli.org
          EXPECTED_TEXT: Secure command-line access
          VALIDATION_ATTEMPTS: "36"
          VALIDATION_DELAY_SECONDS: "10"
        run: python scripts/validate_static_site.py

  deploy-prod:
    name: Deploy prod
    if: >-
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    runs-on: ubuntu-latest
    environment:
      name: ${{ 'prod' }}
      url: https://telecli.org
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Cloudflare Pages prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: telecli
          CLOUDFLARE_PAGES_PRODUCTION_BRANCH: main
          CLOUDFLARE_PAGES_CUSTOM_DOMAINS: telecli.org,www.telecli.org
          CLOUDFLARE_DNS_TARGET: telecli.pages.dev
          CLOUDFLARE_ZONE_NAME: telecli.org
          CLOUDFLARE_REPLACE_CONFLICTING_DNS: "true"
        run: python scripts/cloudflare_pages_setup.py

      - name: Deploy prod to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website --project-name=telecli --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate prod deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          CUSTOM_URL: https://telecli.org
          EXPECTED_TEXT: Secure command-line access
          VALIDATION_ATTEMPTS: "36"
          VALIDATION_DELAY_SECONDS: "10"
        run: python scripts/validate_static_site.py
