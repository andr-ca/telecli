name: Code Quality Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Syntax check
        run: |
          python -m py_compile src/*.py
          echo "✅ Python syntax check passed"

      - name: Basic security check
        run: |
          # Check for common security issues
          echo "🔍 Running basic security checks..."

          # Check for hardcoded secrets (basic patterns)
          if grep -r "password\s*=\s*['\"][^'\"]*['\"]" src/ --include="*.py" | grep -v "placeholder\|example\|test"; then
            echo "❌ Potential hardcoded password found"
            exit 1
          fi

          # Check for Python string interpolation passed into execute/query calls
          if grep -rE "(^|[^[:alnum:]_])(execute|query)[[:space:]]*\([^#]*['\"][^'\"]*['\"][[:space:]]*%" src/ --include="*.py"; then
            echo "❌ Potential SQL injection vulnerability found"
            exit 1
          fi

          echo "✅ Basic security check passed"

      - name: Code quality summary
        run: |
          echo "📊 Code Quality Summary:"
          echo "- Python syntax: ✅ PASSED"
          echo "- Security check: ✅ PASSED"
          echo "- Ready for merge: ✅ YES"
